automation_id: morning-briefing
name: Morning Briefing
description: Run morning briefing at 7am UTC on weekdays
workflow_id: morning-briefing
input:
  focus: "Today's priorities and overnight updates"
  output_path: "./memory/agent/morning-briefing.txt"
schedule:
  schedule_type: cron
  cron_expression: "0 7 * * 1-5"
trigger:
  trigger_type: schedule
policy:
  max_retries: 2
  concurrency_limit: 1
  timeout_seconds: 600
  backoff_seconds: 30
status: enabled
