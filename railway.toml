[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
# Do not set startCommand here — it overrides Dockerfile CMD.
# Dockerfile CMD uses ${PORT:-8741}; a $PORT-only startCommand crashes
# when PORT is unset (uvicorn never binds → Railway healthcheck fails).
healthcheckPath = "/api/v1/health"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
numReplicas = 1

# Attach a persistent volume in the Railway dashboard:
#   Mount path: /data
#   Set AI_OS_DATA_DIR=/data (default in Dockerfile)
